name: app5
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & state management
  cupertino_icons: ^1.0.5
  get: ^4.6.5
  convex_bottom_bar: ^3.2.0
  flutter_spinkit: ^5.1.0
  font_awesome_flutter: ^10.4.0
  google_fonts: ^8.0.1
  solid_bottom_sheet: ^0.1.10

  # Networking & localization
  http: ^1.6.0
  intl: ^0.20.2

  # Storage & utilities
  shared_preferences: ^2.0.18
  hijri: ^3.0.0
  location: ^8.0.1

  # Audio
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  adhan: ^2.0.0-nullsafety.2

  # Prayer alarm & notifications
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  permission_handler: ^11.3.1
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/icon.png
    - assets/audio/
